<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogo Imparable Hombre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
  <style>
:root {
  --blue: #0066ff;
  --black: #0a0a0a;
  --ink: #f5f7fb;
  --muted: #9aa3b2;
  --line: rgba(255,255,255,0.12);
  --panel: #111318;
  --panel-2: #171a21;
  --white: #ffffff;
  --red: #e81818;
  --green: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--ink); font-family: Inter, Arial, sans-serif; min-height: 100vh; }
button, input, select { font: inherit; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px clamp(16px,4vw,48px);
  background: rgba(10,10,10,0.9); border-bottom: 1px solid var(--line);
  backdrop-filter: blur(16px);
}
.brand-mark { display: flex; align-items: center; gap: 10px; color: var(--white); font-size: clamp(22px,4vw,36px); font-weight: 900; font-style: italic; text-decoration: none; line-height: 1; }
.brand-mark img { height: clamp(26px,3.5vw,38px); width: auto; }
.brand-i { color: var(--blue); }
.cart-button { position: relative; display: flex; align-items: center; justify-content: center; width: 46px; height: 46px; border: 1px solid var(--line); color: var(--white); background: var(--panel); cursor: pointer; border-radius: 0; flex-shrink: 0; }
.cart-button:hover { background: var(--blue); border-color: var(--blue); }
.cart-count { position: absolute; top: 5px; right: 5px; min-width: 18px; height: 18px; padding: 0 4px; background: var(--blue); color: #fff; font-size: 11px; font-weight: 900; font-style: normal; border-radius: 9px; display: flex; align-items: center; justify-content: center; }

/* ── HERO ── */
.hero {
  padding: clamp(40px,6vw,72px) clamp(16px,4vw,48px);
  background: linear-gradient(110deg,rgba(0,102,255,0.18),transparent 40%), #050505;
  border-bottom: 1px solid var(--line);
}
.hero h1 { color: var(--white); font-size: clamp(56px,12vw,140px); font-style: italic; font-weight: 900; line-height: 0.88; }
.hero h1 span { color: var(--blue); }
.hero p { color: #ccd2de; font-size: clamp(16px,2vw,20px); margin-top: 16px; max-width: 480px; }

/* ── CONTROLS ── */
.controls {
  display: grid; grid-template-columns: 1fr auto auto; gap: 10px;
  padding: 18px clamp(16px,4vw,48px);
  background: #090a0d; border-bottom: 1px solid var(--line);
}
.controls input, .controls select {
  height: 44px; border: 1px solid var(--line); padding: 0 14px;
  color: var(--white); background: var(--panel); border-radius: 0; width: 100%;
}

/* ── CATALOG VIEW ── */
#viewCatalog { padding: clamp(20px,4vw,48px) clamp(16px,4vw,48px); }
.families-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; }
.family-card {
  background: var(--panel); border: 1px solid var(--line); cursor: pointer;
  display: flex; flex-direction: column; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.family-card:hover { border-color: var(--blue); transform: translateY(-2px); }
.family-card-img { aspect-ratio: 1/1.1; background: #0a0a0a; overflow: hidden; }
.family-card-img img { width: 100%; height: 100%; object-fit: contain; }
.family-card-body { padding: 12px; }
.family-card-body h3 { color: var(--white); font-size: 13px; font-weight: 800; text-transform: uppercase; line-height: 1.3; margin-bottom: 4px; }
.family-card-body span { color: var(--muted); font-size: 12px; }

/* ── PRODUCT VIEW ── */
#viewProduct { display: none; padding: 0 clamp(16px,4vw,48px) 60px; }
.back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 700; padding: 18px 0; }
.back-btn:hover { color: var(--white); }
.back-btn svg { width: 18px; height: 18px; }

.product-page { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
@media (max-width: 700px) { .product-page { grid-template-columns: 1fr; } }

/* Left col: image */
.product-image-col {}
.main-image-wrap { aspect-ratio: 1/1.1; background: #0a0a0a; border: 1px solid var(--line); overflow: hidden; cursor: zoom-in; margin-bottom: 12px; }
.main-image-wrap img { width: 100%; height: 100%; object-fit: contain; }
.color-thumbs { display: flex; gap: 8px; flex-wrap: wrap; }
.color-thumb { width: 56px; height: 56px; border: 2px solid var(--line); cursor: pointer; background: #0a0a0a; overflow: hidden; flex-shrink: 0; transition: border-color 0.15s; }
.color-thumb img { width: 100%; height: 100%; object-fit: contain; }
.color-thumb.active { border-color: var(--blue); }

/* Right col: order form */
.product-order-col {}
.product-title { color: var(--white); font-size: clamp(20px,4vw,32px); font-weight: 900; text-transform: uppercase; margin-bottom: 6px; line-height: 1.2; }
.product-subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

/* ── COLOR ACCORDION ── */
.color-accordion { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.color-row { border: 1px solid var(--line); overflow: hidden; border-radius: 4px; }
.color-row-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; background: var(--panel); user-select: none; border: none; width: 100%; text-align: left; }
.color-row-header:hover, .color-row.open .color-row-header { background: #1a1d26; }
.color-row.open .color-row-header { border-bottom: 1px solid var(--line); }
.color-dot-sm { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.2); }
.color-name { color: var(--white); font-size: 15px; font-weight: 800; flex: 1; }
.color-row-badge { font-size: 12px; font-weight: 700; color: var(--blue); background: rgba(0,102,255,0.15); padding: 2px 8px; border-radius: 10px; display: none; }
.color-row.has-qty .color-row-badge { display: block; }
.color-row-arrow { color: var(--muted); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
.color-row.open .color-row-arrow { transform: rotate(90deg); }
.color-row-sizes { display: none; padding: 16px; background: #0d0f14; }
.color-row.open .color-row-sizes { display: block; }
.sizes-label { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
.sizes-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.size-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 44px; }
.size-item > span { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.q-minus, .q-plus { width: 30px; height: 30px; background: var(--panel); border: 1px solid var(--line); color: var(--white); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
.q-plus:hover { background: var(--blue); border-color: var(--blue); }
.q-minus:hover { background: #2a2d36; }
.q-val { color: var(--white); font-size: 15px; font-weight: 900; width: 24px; text-align: center; }
.q-val.active { color: var(--blue); }

.add-family-btn { width: 100%; padding: 16px; background: var(--blue); border: none; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; letter-spacing: 0.04em; border-radius: 4px; }
.add-family-btn:hover { background: #0052cc; }
.order-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 12px; border-top: 1px solid var(--line); color: var(--muted); font-size: 13px; }
.order-total strong { color: var(--white); font-size: 16px; }

@media (max-width: 520px) {
  .controls { grid-template-columns: 1fr; }
  .sizes-grid { gap: 8px; }
  .q-minus, .q-plus { width: 26px; height: 26px; font-size: 16px; }
}
  </style>
</head>
<body>

<header class="topbar">
  <a class="brand-mark" href="#" id="logoLink">
    <img src="assets/brand/isotipo.png" alt="Imparable" />
    <span><span class="brand-i">i</span>mparable</span>
  </a>
  <button class="cart-button" id="cartBtn" type="button" title="Carrito">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<!-- VISTA CATÁLOGO -->
<div id="viewCatalog">
  <section class="hero">
    <h1><span>i</span>mparable</h1>
    <p>Ropa diseñada para hombres que no se detienen.</p>
  </section>

  <div class="controls">
    <input id="searchInput" type="search" placeholder="Buscar producto..." />
    <select id="designFilter"></select>
    <select id="colorFilter"></select>
  </div>

  <div class="families-grid" id="familiesGrid"></div>
</div>

<!-- VISTA PRODUCTO -->
<div id="viewProduct">
  <button class="back-btn" id="backBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver al catálogo
  </button>
  <div class="product-page" id="productPage"></div>
</div>

<!-- CARRITO -->
<div class="cart-panel hidden" id="cartPanel">
  <div class="cart-header">
    <h2>Carrito</h2>
    <button id="cartClose">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>
<div class="cart-overlay hidden" id="cartOverlay"></div>

<!-- LIGHTBOX -->
<div class="lightbox hidden" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="" />
</div>

<script>
// ── DATOS ──
const STORAGE_KEY = "imparable-prices-v2";
const COLOR_MAP = { blanco:"#ffffff", negro:"#111", rojo:"#e81818", rey:"#0066ff", "azul oscuro":"#071733", "sin color":"#555" };
const SIZES = ["XS","S","M","L","XL","XXL"];
const DESIGN_ORDER = [
  "Camiseta Ultra Fit Manga Corta","Camiseta Ultra Fit Manga Larga",
  "Camiseta Basica Algodon","Camiseta Basica Fit Sin Mangas",
  "Camiseta Imparable","Camiseta Olimpica",
  "Camiseta Oversize Con Mangas","Camiseta Oversize Sin Mangas",
  "Pantaloneta Corta Fit","Pantaloneta Corte Basico",
  "Jogger","Licra Larga","Licra Corta","Sweater","Otros"
];

// Orden fijo de colores en todas las familias
const COLOR_ORDER = ["negro","blanco","rojo","rey","azul oscuro","sin color"];

const FILES = [
  "Camiseta basica algodon azul oscuro imparable.png",
  "Camiseta basica algodon blanco imparable.png",
  "Camiseta basica algodon negro imparable.png",
  "Camiseta basica algodon rojo imparable.png",
  "Camiseta basica fit sin mangas blanca imparable.png",
  "Camiseta basica fit sin mangas negro imparable.png",
  "Camiseta basica fit sin mangas rojo imparable.png",
  "Camiseta basica lagodon azul rey imparable.png",
  "Camiseta con mangas oversize azul oscuro imparable.png",
  "Camiseta imparable color azul oscuro.png",
  "Camiseta imparable color azul rey.png",
  "Camiseta imparable color blanco.png",
  "camiseta imparable color rojo.png",
  "camiseta olimpica de hombre azul oscuro.png",
  "Camiseta olimpica de hombre azul rey.png",
  "Camiseta olimpica de hombre blanco.png",
  "Camiseta olimpica de hombre negro.png",
  "Camiseta olimpica de hombre rojo.png",
  "camiseta oversize con manga rojo imparable.png",
  "camiseta oversize con mangas blanco imparable.png",
  "Camiseta oversize con mangas rey imparable.png",
  "Camiseta oversize sin mangas azul oscuro imparable.png",
  "camiseta oversize sin mangas blanco imparable.png",
  "camiseta oversize sin mangas negro imparable.png",
  "camiseta oversize sin mangas rojo imparable.png",
  "Camiseta sin mangas oversize azul rey imparable.png",
  "Camiseta ultra fit manga corta color blanco imparable.png",
  "camiseta ultra fit manga corta color rey imparable.png",
  "Camiseta ultra fit manga corta color rojo imparable.png",
  "Camiseta ultra fit manga corte color negro imparable.png",
  "Camiseta ultra fit manga larga color blanco imparable.png",
  "Camiseta ultra fit manga larga color negro imparable.png",
  "Camiseta ultra fit manga larga color rojo imparable.png",
  "Camistea basica fit sin mangas azul rey imparable.png",
  "Camiseta imparable color nego.png",
  "Camistea ultra fit manga larga color azul oscuro imprabale.png",
  "Camsieta basica fit sin mangas azul oscuro imparable.png",
  "Cmaiseta oversize con mangas negro imparable.png",
  "Cmaiseta ultra fit manga corta color azul oscuro imparable .png",
  "Cmaiseta ultra fit manga larga color rey imparable.png",
  "Licra corta color azul oscuro imparable.png",
  "Licra corta color blanco imparable.png",
  "Licra corta color negro imparable.png",
  "Licra corta color rey imparav.png",
  "Licra corta color rojo imparable.png",
  "Licra larga color negro imparable.png",
  "Licra larga color rojo imparable.png",
  "Licra larga de hombre color azul oscuro imparable.png",
  "Licra larga de hombre color blanco imparable.png",
  "Licra larga de hombre color rey imparable.png",
  "Panataloneta corta fit rey imparable.png",
  "Panatloneta corte basico azul oscuro imparable.png",
  "Pantaloneta basica azul rey imparable.png",
  "Pantaloneta corta fit azul oscuro imparable.png",
  "Pantaloneta corta fit negro imparable.png",
  "Pantaloneta corta fit rojo imparable.png",
  "Pantaloneta corte basico blanco imparable.png",
  "Pantaloneta corte basico negro imparable.png",
  "Pantaloneta corte basico rojo imparable.png",
  "Pnataloneta corta fit blanca imparable.png",
  "Sweter azul oscuro imparable.png",
  "Sweter color blanco imparable.png",
  "Sweter color rey imparable.png",
  "Sweter color rojo imparable.png",
  "Sweter de hombre color negro imparable.png",
  "Jogger de hombre imparable negro.png",
  "Jogger de hombre imparable blanco.png",
  "Jogger de hombre imparable rojo.png",
  "Jogger de hombre imparable rey.png",
  "Jogger de hombre imparable azul oscuro.png"
];

const prices = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch { return {}; } })();
const products = FILES.map((file, i) => buildProduct(file, i));
const cart = [];

// Agrupar por familia y ordenar colores consistentemente
function sortColors(items) {
  return [...items].sort((a,b) => {
    const ai = COLOR_ORDER.indexOf(a.colorLabel);
    const bi = COLOR_ORDER.indexOf(b.colorLabel);
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });
}

function getGroups(list) {
  const map = new Map();
  list.forEach(p => { if (!map.has(p.design)) map.set(p.design,[]); map.get(p.design).push(p); });
  return [...map.entries()]
    .sort((a,b) => DESIGN_ORDER.indexOf(a[0]) - DESIGN_ORDER.indexOf(b[0]))
    .map(([design, items]) => [design, sortColors(items)]);
}

// ── ESTADO DE FILTROS ──
const state = { search:"", design:"Todos", color:"Todos" };

// ── INIT ──
populateFilters();
renderCatalog();
bindEvents();

function bindEvents() {
  document.getElementById("searchInput").addEventListener("input", e => { state.search = e.target.value.trim().toLowerCase(); renderCatalog(); });
  document.getElementById("designFilter").addEventListener("change", e => { state.design = e.target.value; renderCatalog(); });
  document.getElementById("colorFilter").addEventListener("change", e => { state.color = e.target.value; renderCatalog(); });
  document.getElementById("backBtn").addEventListener("click", showCatalog);
  document.getElementById("logoLink").addEventListener("click", e => { e.preventDefault(); showCatalog(); });
  document.getElementById("cartBtn").addEventListener("click", openCart);
  document.getElementById("cartClose").addEventListener("click", closeCart);
  document.getElementById("cartOverlay").addEventListener("click", closeCart);
  document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
  document.getElementById("lightbox").addEventListener("click", e => { if(e.target.id==="lightbox") closeLightbox(); });
  document.addEventListener("keydown", e => { if(e.key==="Escape"){ closeLightbox(); closeCart(); } });
}

function populateFilters() {
  const designs = ["Todos", ...DESIGN_ORDER.filter(d => products.some(p => p.design===d))];
  const colors = ["Todos", ...unique(products.map(p => p.colorLabel))];
  const df = document.getElementById("designFilter");
  const cf = document.getElementById("colorFilter");
  df.replaceChildren(...designs.map(mkOpt));
  cf.replaceChildren(...colors.map(mkOpt));
}

// ── VISTA CATÁLOGO ──
function renderCatalog() {
  const visible = products.filter(p => {
    const q = `${p.name} ${p.design} ${p.colorLabel}`.toLowerCase();
    return (!state.search || q.includes(state.search))
      && (state.design==="Todos" || p.design===state.design)
      && (state.color==="Todos" || p.colorLabel===state.color);
  });
  const groups = getGroups(visible);
  const grid = document.getElementById("familiesGrid");
  grid.replaceChildren();

  if (!groups.length) {
    const d = document.createElement("p");
    d.style.cssText = "color:var(--muted);padding:48px 0;text-align:center;width:100%";
    d.textContent = "No hay productos con esos filtros.";
    grid.append(d);
    return;
  }

  groups.forEach(([design, items]) => {
    const reyImg = (items.find(p => p.colorLabel==="rey") || items[0]).file;
    const card = document.createElement("div");
    card.className = "family-card";
    card.innerHTML = `
      <div class="family-card-img"><img src="assets/products/${encodeURIComponent(reyImg)}" alt="${design}" loading="lazy" /></div>
      <div class="family-card-body">
        <h3>${design}</h3>
        <span>${items.length} color${items.length===1?"":"es"}</span>
      </div>`;
    card.addEventListener("click", () => showProduct(design, items));
    grid.append(card);
  });
}

function showCatalog() {
  document.getElementById("viewCatalog").style.display = "";
  document.getElementById("viewProduct").style.display = "none";
  window.scrollTo(0,0);
}

// ── VISTA PRODUCTO ──
function showProduct(design, items) {
  document.getElementById("viewCatalog").style.display = "none";
  document.getElementById("viewProduct").style.display = "block";
  window.scrollTo(0,0);

  // Estado local de la página de producto
  let activeColor = items.find(p => p.colorLabel==="rey") || items[0];
  // qty[productId][size] = número
  const qty = {};
  items.forEach(p => { qty[p.id] = {}; SIZES.forEach(s => qty[p.id][s] = 0); });

  const page = document.getElementById("productPage");
  page.innerHTML = "";

  // ── Columna imagen ──
  const imgCol = document.createElement("div");
  imgCol.className = "product-image-col";

  const mainWrap = document.createElement("div");
  mainWrap.className = "main-image-wrap";
  const mainImg = document.createElement("img");
  mainImg.src = imgPath(activeColor.file);
  mainImg.alt = design;
  mainWrap.append(mainImg);
  mainWrap.addEventListener("click", () => openLightbox(mainImg.src, design));

  const thumbsRow = document.createElement("div");
  thumbsRow.className = "color-thumbs";
  items.forEach(p => {
    const t = document.createElement("div");
    t.className = "color-thumb" + (p.id===activeColor.id ? " active" : "");
    t.innerHTML = `<img src="${imgPath(p.file)}" alt="${p.colorLabel}" loading="lazy" />`;
    t.addEventListener("click", () => {
      activeColor = p;
      mainImg.src = imgPath(p.file);
      thumbsRow.querySelectorAll(".color-thumb").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
    });
    thumbsRow.append(t);
  });

  imgCol.append(mainWrap, thumbsRow);

  // ── Columna pedido ──
  const orderCol = document.createElement("div");
  orderCol.className = "product-order-col";
  orderCol.innerHTML = `<h2 class="product-title">${design}</h2><p class="product-subtitle">${items.length} color${items.length===1?"":"es"} disponible${items.length===1?"":"s"}</p>`;

  // Acordeon: colores desplegables
  const accordion = document.createElement("div");
  accordion.className = "color-accordion";

  items.forEach(p => {
    const row = document.createElement("div");
    row.className = "color-row";

    // Header (clickable)
    const header = document.createElement("button");
    header.className = "color-row-header";
    header.type = "button";
    header.innerHTML = `
      <div class="color-dot-sm" style="background:${p.colorHex}"></div>
      <span class="color-name">${cap(p.colorLabel)}</span>
      <span class="color-row-badge" id="badge-${p.id}">0 uds</span>
      <span class="color-row-arrow">▶</span>`;

    // Sizes panel (hidden by default)
    const sizesPanel = document.createElement("div");
    sizesPanel.className = "color-row-sizes";
    sizesPanel.innerHTML = `<p class="sizes-label">Talla y cantidad</p>`;
    const grid = document.createElement("div");
    grid.className = "sizes-grid";

    SIZES.forEach(size => {
      const item = document.createElement("div");
      item.className = "size-item";
      const lbl = document.createElement("span");
      lbl.textContent = size;
      const qv = document.createElement("span");
      qv.className = "q-val";
      qv.textContent = "0";
      const minus = document.createElement("button");
      minus.type = "button"; minus.className = "q-minus"; minus.textContent = "−";
      const plus = document.createElement("button");
      plus.type = "button"; plus.className = "q-plus"; plus.textContent = "+";

      const updateBadge = () => {
        const total = SIZES.reduce((s,sz) => s + qty[p.id][sz], 0);
        const badge = document.getElementById("badge-"+p.id);
        if (badge) { badge.textContent = total+" uds"; }
        row.classList.toggle("has-qty", total > 0);
        updateTotal();
      };

      plus.addEventListener("click", () => {
        qty[p.id][size]++;
        qv.textContent = qty[p.id][size];
        qv.classList.toggle("active", qty[p.id][size] > 0);
        updateBadge();
      });
      minus.addEventListener("click", () => {
        if (qty[p.id][size] > 0) {
          qty[p.id][size]--;
          qv.textContent = qty[p.id][size];
          qv.classList.toggle("active", qty[p.id][size] > 0);
          updateBadge();
        }
      });

      const ctrl = document.createElement("div");
      ctrl.className = "qty-ctrl";
      ctrl.append(minus, qv, plus);
      item.append(lbl, ctrl);
      grid.append(item);
    });

    sizesPanel.append(grid);

    // Toggle open/close
    header.addEventListener("click", () => {
      row.classList.toggle("open");
      // Update main image when opening
      if (row.classList.contains("open")) {
        mainImg.src = imgPath(p.file);
        thumbsRow.querySelectorAll(".color-thumb").forEach((t,i) => t.classList.toggle("active", items[i].id === p.id));
      }
    });

    row.append(header, sizesPanel);
    accordion.append(row);
  });

  const totalRow = document.createElement("div");
  totalRow.className = "order-total";
  totalRow.innerHTML = `<span>Total prendas</span><strong id="orderTotalNum">0</strong>`;

  const addBtn = document.createElement("button");
  addBtn.className = "add-family-btn";
  addBtn.textContent = "+ Agregar al carrito";

  function updateTotal() {
    let t = 0;
    items.forEach(p => SIZES.forEach(s => t += qty[p.id][s]));
    const el = document.getElementById("orderTotalNum");
    if (el) el.textContent = t;
  }

  addBtn.addEventListener("click", () => {
    let added = 0;
    items.forEach(p => {
      SIZES.forEach(size => {
        const q = qty[p.id][size];
        if (q > 0) { addToCart(p, size, q); added++; }
      });
    });
    if (!added) {
      addBtn.textContent = "⚠ Selecciona cantidades primero";
      addBtn.style.background = "var(--red)";
      setTimeout(() => { addBtn.textContent = "+ Agregar al carrito"; addBtn.style.background = ""; }, 2000);
      return;
    }
    // Reset
    items.forEach(p => SIZES.forEach(s => { qty[p.id][s]=0; }));
    accordion.querySelectorAll(".q-val").forEach(v => { v.textContent="0"; v.classList.remove("active"); });
    accordion.querySelectorAll(".color-row").forEach(r => r.classList.remove("has-qty"));
    accordion.querySelectorAll(".color-row-badge").forEach(b => b.textContent="0 uds");
    updateTotal();
    addBtn.textContent = "✓ Agregado al carrito";
    addBtn.style.background = "var(--green)";
    setTimeout(() => { addBtn.textContent = "+ Agregar al carrito"; addBtn.style.background = ""; }, 2000);
  });

  orderCol.append(accordion, totalRow, addBtn);
  page.append(imgCol, orderCol);
}

// ── CARRITO ──
function addToCart(product, size, qty) {
  const ex = cart.find(i => i.id===product.id && i.size===size);
  if (ex) ex.qty += qty; else cart.push({...product, size, qty});
  document.getElementById("cartCount").textContent = cart.reduce((s,i)=>s+i.qty,0);
  openCart();
}

function openCart() {
  document.getElementById("cartPanel").classList.remove("hidden");
  document.getElementById("cartOverlay").classList.remove("hidden");
  document.body.style.overflow = "hidden";
  renderCart();
}

function closeCart() {
  document.getElementById("cartPanel").classList.add("hidden");
  document.getElementById("cartOverlay").classList.add("hidden");
  document.body.style.overflow = "";
}

function renderCart() {
  const items = document.getElementById("cartItems");
  const footer = document.getElementById("cartFooter");
  items.replaceChildren();

  if (!cart.length) {
    items.innerHTML = `<div class="cart-empty">Tu carrito está vacío.</div>`;
    footer.innerHTML = "";
    return;
  }

  cart.forEach((item, idx) => {
    const el = document.createElement("div");
    el.className = "cart-item";
    el.innerHTML = `
      <img src="${imgPath(item.file)}" alt="${item.name}" />
      <div><p class="ci-name">${item.design}</p><p class="ci-meta">${cap(item.colorLabel)} · Talla ${item.size} · ${item.qty} ud.</p></div>
      <button class="ci-remove">✕</button>`;
    el.querySelector(".ci-remove").addEventListener("click", () => {
      cart.splice(idx,1);
      document.getElementById("cartCount").textContent = cart.reduce((s,i)=>s+i.qty,0);
      renderCart();
    });
    items.append(el);
  });

  const total = cart.reduce((s,i)=>s+i.qty,0);
  footer.innerHTML = `
    <div class="cart-total-row"><span>Total prendas</span><strong>${total}</strong></div>
    <button class="cart-wa-btn" id="waBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.11 1.523 5.834L0 24l6.336-1.501A11.951 11.951 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.006-1.372l-.359-.214-3.724.881.916-3.617-.234-.372A9.818 9.818 0 1 1 12 21.818z"/></svg>
      Hacer pedido por WhatsApp
    </button>`;
  document.getElementById("waBtn").addEventListener("click", () => {
    const lines = cart.map(i => `• ${i.design} | ${cap(i.colorLabel)} | Talla ${i.size} | ${i.qty} ud.`).join("\n");
    const msg = encodeURIComponent(`Hola! Quiero hacer un pedido:\n\n${lines}\n\n¡Gracias!`);
    window.open(`https://wa.me/?text=${msg}`, "_blank");
  });
}

// ── LIGHTBOX ──
function openLightbox(src, alt) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightboxImg").alt = alt;
  document.getElementById("lightbox").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  document.getElementById("lightbox").classList.add("hidden");
  document.body.style.overflow = "";
}

// ── HELPERS ──
function buildProduct(file, i) {
  const n = normalize(file);
  return { id:`IMP-${String(i+1).padStart(3,"0")}`, file, name: cap(file.replace(/\.png$/i,"").trim()), design: detectDesign(n), colorLabel: detectColor(n), colorHex: COLOR_MAP[detectColor(n)]||"#555" };
}
function detectDesign(t) {
  if (t.includes("ultra fit") && (t.includes("manga corta")||t.includes("manga corte"))) return "Camiseta Ultra Fit Manga Corta";
  if (t.includes("ultra fit") && t.includes("manga larga")) return "Camiseta Ultra Fit Manga Larga";
  if (t.includes("jogger")) return "Jogger";
  if (t.includes("licra larga")) return "Licra Larga";
  if (t.includes("licra corta")) return "Licra Corta";
  if (t.includes("sweter")||t.includes("sweater")) return "Sweater";
  if (t.includes("pantaloneta corta fit")||t.includes("pnataloneta")||t.includes("panataloneta")) return "Pantaloneta Corta Fit";
  if (t.includes("pantaloneta corte basico")||t.includes("panatloneta")||t.includes("pantaloneta basica")) return "Pantaloneta Corte Basico";
  if (t.includes("basica algodon")||t.includes("basica lagodon")) return "Camiseta Basica Algodon";
  if (t.includes("oversize") && (t.includes("con manga")||t.includes("con mangas"))) return "Camiseta Oversize Con Mangas";
  if (t.includes("oversize") && t.includes("sin mangas")) return "Camiseta Oversize Sin Mangas";
  if (t.includes("oversize")) return "Camiseta Oversize Con Mangas";
  if (t.includes("basica fit sin mangas")||t.includes("sin mangas")) return "Camiseta Basica Fit Sin Mangas";
  if (t.includes("camiseta imparable")) return "Camiseta Imparable";
  if (t.includes("olimpica")) return "Camiseta Olimpica";
  return "Otros";
}
function detectColor(t) {
  if (t.includes("azul oscuro")) return "azul oscuro";
  if (t.includes("azul rey")||t.includes("color rey")||/ rey[ .]/.test(t)||t.endsWith(" rey")) return "rey";
  if (t.includes("blanco")||t.includes("blanca")) return "blanco";
  if (t.includes("negro")||t.includes("nego")) return "negro";
  if (t.includes("rojo")) return "rojo";
  return "sin color";
}
function normalize(v) { return v.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/\.png$/i,""); }
function cap(v) { return v ? v.charAt(0).toUpperCase()+v.slice(1) : v; }
function imgPath(file) { return "assets/products/"+encodeURIComponent(file); }
function mkOpt(v) { const o=document.createElement("option"); o.value=o.textContent=v; return o; }
function unique(arr) { return [...new Set(arr)].sort((a,b)=>a.localeCompare(b,"es")); }
</script>
